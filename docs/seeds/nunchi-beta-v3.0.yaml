goal: >
  Nunchi 웹앱(Next.js 16 App Router / Supabase)의 MVP → Beta 전환.
  인터뷰에서 확정된 11개 기능 요구사항(각각 세부 인수기준으로 분해되어 총 17개 AC)을
  기존 pnpm 모노레포 코드베이스에 3개 Phase(3a Auth·Admin / 3b Onboarding·Personalization /
  3c Content Automation)로 구현한다.

constraints:
  - "기존 pnpm monorepo 구조 유지 (apps/web, packages/llm, packages/shared)"
  - "Next.js 16 App Router + Supabase Auth/Postgres + pgvector 스택 유지"
  - "관리자 인증 — Google OAuth + users.role 컬럼 (admin|user); 별도 admin 테이블 불가"
  - "온보딩 건너뛰기 불가 — 첫 로그인 후 /onboarding 강제, skip 버튼 없음"
  - "users 추가 컬럼 — company, brand, product_name 모두 nullable (선택사항)"
  - "개인화 LLM 입력 — industries[] + channels[] 만 전달 (company/brand/product_name 제외)"
  - "LLM 캐시 전략 B-2 — 공통 input_hash 캐시 유지 + personalizeRationale() 후처리 레이어"
  - "뉴스 자동화 검증 — 반자동, LLM 초안 생성 후 admin 승인 큐 (자동 배포 불가)"
  - "뉴스 수집 범위 — 대형사건·정치사회·기념일만 (연예·스포츠 등 제외)"
  - "이메일 알림 — Resend 사용; /contact 공개 접근"
  - "베타 성공 기준 — 기한 없음, 17개 AC 모두 안정 통과 = 완료 (11개 기능 요구사항 충족)"

acceptance_criteria:
  # Phase 3a — Auth & Admin
  - "waitlist 관련 코드·UI·API 완전 제거 확인"
  - "Google OAuth 로그인·로그아웃 정상 동작 (Supabase Auth)"
  - "/calendar 미로그인 공개 접근 가능; /check 미로그인 시 / 로 리다이렉트"
  - "users.role='admin' 계정만 /admin/* 접근; 일반 유저 접근 시 403 또는 리다이렉트"
  - "로고 옆 'Beta' 배지 표시"
  - "캘린더 페이지 버튼명이 '캠페인 캘린더'로 변경됨"
  # Phase 3b — Onboarding & Personalization
  - "첫 Google 로그인 후 /onboarding 자동 리다이렉트; skip 버튼 없음"
  - "onboarding 폼: industries 14개 다중선택, channels 10개 다중선택, company/brand/product_name 선택사항"
  - "/mypage에서 onboarding 정보 수정·저장 가능"
  - "검토 결과 카드 하단에 '맞춤 코멘트' 섹션이 표시됨 (personalizeRationale 출력)"
  - "personalizeRationale은 industries·channels만 LLM에 전달; 공통 캐시 히트율 저하 없음"
  - "7개 라우트 네비게이션 메뉴 구현; 메인 타이틀 폰트 크기 개선"
  # Phase 3c — Content Automation
  - "/admin/events에서 events CRUD (status: draft/approved/archived, source 컬럼)"
  - "네이버 뉴스 API cron 1일 1회 실행; 대형사건·정치사회·기념일만 필터링"
  - "LLM이 event 초안 생성 후 status='pending_review'로 DB 삽입"
  - "/admin/news-queue에서 pending_review 이벤트 승인·거부 가능"
  - "/contact 공개 접근; 문의 제출 시 inquiries 테이블 저장 + Resend 이메일 발송"

ontology_schema:
  name: NunchiiBeta
  description: >
    Nunchi Beta 단계의 핵심 도메인 모델.
    인증된 사용자 프로필, 한국 민감일 이벤트(수동+자동), 캠페인 검토,
    문의 엔티티를 포함한다.
  fields:
    - name: user
      type: object
      description: "id, email, role(admin|user), company?, brand?, product_name?, industries:array, channels:array, onboarding_completed_at?"
    - name: event
      type: object
      description: "id, date, name, category, risk_level, related_keywords:array, related_motifs:array, recommended_tone, summary, references:array, status(draft|pending_review|approved|archived), source(manual|naver_auto)"
    - name: campaign
      type: object
      description: "id, user_id, date, name, copy, asset_keywords:array, status"
    - name: review
      type: object
      description: "id, campaign_id, risk_score, flagged_keywords:array, matched_events:array, suggestions, llm_rationale, personalized_comment, reviewed_at"
    - name: inquiry
      type: object
      description: "id, user_id?, name, email, message, created_at"

evaluation_principles:
  - name: functional_completeness
    description: "17개 AC 모두 통과, Phase 3a→3b→3c 순서 회귀 없음"
    weight: 0.35
  - name: security
    description: "RLS 정책 완전성, admin 권한 검증, OAuth 토큰 보안, 캠페인 데이터 기밀성"
    weight: 0.25
  - name: ux_quality
    description: "온보딩 강제 흐름, 네비게이션 명확성, /check 우선 디자인 개선, Beta 배지"
    weight: 0.20
  - name: data_integrity
    description: "뉴스 자동화 승인 큐 무결성, 개인화 데이터(industries·channels) 분리, 공통 캐시 불변"
    weight: 0.20

exit_conditions:
  - name: all_features_stable
    description: "17개 AC 모두 통과, 기존 28개 회귀 테스트 green"
    criteria: "CI 녹색, 수동 QA 확인, 사용자·관리자 플로우 E2E 통과"
  - name: critical_bug
    description: "데이터 유출·권한 우회·서비스 다운 등 크리티컬 버그 발생 시 즉시 중단"
    criteria: "CRITICAL severity 버그 발생 시 해당 phase 롤백"

